image:
  name: gsoci.azurecr.io/giantswarm/cluster-api-provider-proxmox
  tag: v0.8.1

crdInstall:
  enable: true
  kubectl:
    image: giantswarm/docker-kubectl
    registry: gsoci.azurecr.io
    tag: 1.34.4

ciliumNetworkPolicy:
  enabled: true

resources:
  limits:
    cpu: 1000m
    memory: 2048Mi
  requests:
    cpu: 200m
    memory: 512Mi

priorityClass: ""

serviceMonitor:
  enabled: true
  # -- (duration) Prometheus scrape interval.
  interval: "60s"
  # -- (duration) Prometheus scrape timeout.
  scrapeTimeout: "45s"

global:
  podSecurityStandards:
    enforced: false

featureGates:
  ClusterTopology: false
